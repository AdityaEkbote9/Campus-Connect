services:
  - type: web
    name: campus-connect-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: USE_IN_MEMORY_DB
        value: false
  - type: static
    name: campus-connect-web
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
